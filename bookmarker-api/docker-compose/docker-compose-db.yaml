# 분리한 파일에서 실행
# docker-compose -f docker-compose-app.yaml -f docker-compose-db.yaml up
# docker-compose -f docker-compose-app.yaml -f docker-compose-db.yaml stop

services:
  bookmarker-db:
      image: postgres:14-alpine
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: appdb
      ports:
        - "15432:5432"
